name: 신용잔고 데이터 자동 갱신

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron은 UTC입니다.
    # 평일 한국시간 09:17, 15:17, 21:17에 실행합니다.
    - cron: "17 0,6,12 * * 1-5"

permissions:
  contents: write

concurrency:
  group: credit-balance-update
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 패키지와 Chromium 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Hang on 데이터 수집
        run: python scripts/update_data.py

      - name: 변경된 데이터 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "변경된 데이터가 없습니다."
          else
            git commit -m "chore: update credit balance data"
            git push
          fi

      - name: 실패 진단 파일 업로드
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: credit-balance-debug
          path: debug_capture.json
          if-no-files-found: ignore
          retention-days: 7

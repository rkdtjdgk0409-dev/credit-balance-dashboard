<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta name="color-scheme" content="dark">
  <title>신용잔고 대시보드</title>
  <link rel="stylesheet" href="style.css?v=8.1.0">
</head>
<body>
  <main class="shell">
    <section class="panel ratio-panel">
      <div class="title-row">
        <div>
          <p class="eyebrow">MARKET LEVERAGE</p>
          <h1>예탁금 대비 신용비율</h1>
        </div>
        <p id="asOfText" class="date">최신 데이터 확인 중</p>
      </div>

      <div class="ratio-row">
        <strong id="ratioValue">—%</strong>
        <span id="ratioState" class="state neutral">확인 중</span>
        <span id="ratioChange" class="change">전일 비교 없음</span>
      </div>
    </section>

    <section class="metrics">
      <article class="panel metric credit">
        <span>신용융자 잔고</span>
        <strong id="latestCredit">—</strong>
      </article>
      <article class="panel metric deposit">
        <span>고객예탁금</span>
        <strong id="latestDeposit">—</strong>
      </article>
    </section>

    <section class="panel guide">
      <div class="guide-head">
        <p class="eyebrow">HOW TO READ</p>
        <h2>지표 읽는 법</h2>
      </div>
      <div class="guide-grid">
        <article data-state="stable" class="guide-card stable">
          <span>25% 미만</span>
          <strong>매우 안정</strong>
        </article>
        <article data-state="normal" class="guide-card normal">
          <span>25% 이상 · 35% 미만</span>
          <strong>일반 수준</strong>
        </article>
        <article data-state="warning" class="guide-card warning">
          <span>35% 이상 · 40% 미만</span>
          <strong>주의 구간</strong>
        </article>
        <article data-state="danger" class="guide-card danger">
          <span>40% 이상</span>
          <strong>위험 구간</strong>
        </article>
      </div>
    </section>

    <footer>
      <span id="updatedAt">업데이트 정보 없음</span>
      <a href="https://www.hangon.co.kr/credit-balance" target="_blank" rel="noopener noreferrer">출처: Hang on!</a>
    </footer>
  </main>
  <script src="app.js?v=8.1.0" defer></script>
</body>
</html>

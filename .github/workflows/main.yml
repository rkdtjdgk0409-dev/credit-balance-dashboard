name: 신용잔고 데이터 자동 갱신

on:
  workflow_dispatch:

  schedule:
    # GitHub Actions cron은 UTC 기준
    # 평일 한국시간 09:17, 15:17, 21:17 실행
    - cron: "17 0,6,12 * * 1-5"

permissions:
  contents: write

concurrency:
  group: credit-balance-update
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v7

      - name: Python 설정
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 패키지 및 Chromium 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Hang on 데이터 수집
        run: |
          if [ -f "scripts/update_data.py" ]; then
            python scripts/update_data.py
          elif [ -f "update_data.py" ]; then
            mkdir -p scripts
            cp update_data.py scripts/update_data.py
            python scripts/update_data.py
          else
            echo "::error::update_data.py 파일을 찾을 수 없습니다."
            exit 1
          fi

      - name: 변경된 데이터 확인
        run: |
          if [ ! -f "data.json" ]; then
            echo "::error::data.json 파일이 생성되지 않았습니다."
            exit 1
          fi

          echo "data.json 생성 완료"
          ls -lh data.json

      - name: 변경된 데이터 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data.json

          if git diff --cached --quiet; then
            echo "변경된 데이터가 없습니다."
          else
            git commit -m "chore: update credit balance data"
            git push origin HEAD:main
          fi

      - name: 실패 진단 파일 업로드
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: credit-balance-debug
          path: debug_capture.json
          if-no-files-found: ignore
          retention-days: 7

name: 신용잔고 데이터 자동 갱신

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron은 UTC 기준입니다.
    # 평일 한국시간 09:17, 15:17, 21:17 실행
    - cron: "17 0,6,12 * * 1-5"

permissions:
  contents: write

concurrency:
  group: credit-balance-update
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 패키지 및 Chromium 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Hang on 데이터 수집 및 표시값 검증
        run: python update_data.py

      - name: data.json 검증
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("data.json").read_text(encoding="utf-8"))
          rows = data.get("series", [])
          assert len(rows) >= 2, "시계열 행이 2개 미만입니다."
          latest = rows[-1]
          credit = float(latest["credit_trillion"])
          deposit = float(latest["deposit_trillion"])
          ratio = credit / deposit * 100
          assert credit > 0 and deposit > 0
          assert abs(ratio - float(latest["ratio"])) < 0.03
          print("검증 완료:", latest)
          PY

      - name: 변경된 데이터 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "변경된 데이터가 없습니다."
          else
            git commit -m "chore: update verified credit balance data"
            git push origin HEAD:main
          fi

      - name: 진단 파일 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: credit-balance-debug
          path: debug_capture.json
          if-no-files-found: ignore
          retention-days: 7

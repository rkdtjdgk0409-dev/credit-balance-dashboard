name: 신용잔고 데이터 자동 갱신

on:
  workflow_dispatch:
  schedule:
    # UTC 기준: 평일 한국시간 09:17, 15:17, 21:17
    - cron: "17 0,6,12 * * 1-5"

permissions:
  contents: write

concurrency:
  group: credit-balance-update
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 패키지 및 Chromium 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: 수집기 문법 검사
        run: python -m py_compile update_data.py

      - name: Hang on 데이터 수집
        env:
          PYTHONUNBUFFERED: "1"
        run: python update_data.py

      - name: data.json 검증
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("data.json")
          assert path.exists(), "data.json 파일이 생성되지 않았습니다."
          data = json.loads(path.read_text(encoding="utf-8"))

          rows = data.get("series", [])
          assert isinstance(rows, list) and len(rows) >= 1, "저장된 데이터가 없습니다."
          latest = rows[-1]
          credit = float(latest["credit_trillion"])
          deposit = float(latest["deposit_trillion"])
          ratio = float(latest["ratio"])
          calculated = credit / deposit * 100

          assert credit > 0 and deposit > 0
          assert abs(calculated - ratio) < 0.03, (
              f"비율 불일치: 저장값={ratio}, 재계산={calculated}"
          )

          verified = data.get("verified_against", {})
          if verified.get("date"):
              assert latest["date"] == verified["date"], (
                  f"최신 날짜 불일치: 저장={latest['date']}, 화면={verified['date']}"
              )

          print("검증 완료:", latest)
          print("수집 모드:", data.get("collection_mode"))
          PY

      - name: 변경된 데이터 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json

          if git diff --cached --quiet; then
            echo "변경된 데이터가 없습니다."
          else
            git commit -m "chore: update credit balance data"
            git push origin HEAD:main
          fi

      - name: 진단 파일 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: credit-balance-debug
          path: debug_capture.json
          if-no-files-found: ignore
          retention-days: 7
